<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk SMS Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-slate-50 font-sans text-slate-900 overflow-x-hidden">

    <!-- Login Container -->
    <div id="login-container" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md animate__animated animate__fadeInDown">
            <div class="text-center mb-8">
                <div
                    class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 text-white rounded-full mb-4 shadow-lg shadow-blue-200">
                    <i class="fas fa-paper-plane fa-2x"></i>
                </div>
                <h1 class="text-3xl font-bold text-slate-800">Bulk SMS Panel</h1>
                <p class="text-slate-500 mt-2">Access your secure messaging dashboard</p>
            </div>

            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">API Secret Key</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <i class="fas fa-key"></i>
                        </span>
                        <input type="password" id="api-key" required
                            class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
                            placeholder="API KEY">
                    </div>
                </div>
                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-blue-200">
                    Login to Dashboard
                </button>
            </form>
        </div>
    </div>

    <!-- Main App Container (Hidden initially) -->
    <div id="app-container" class="hidden min-h-screen flex flex-col">
        <!-- Navbar -->
        <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 flex items-center text-blue-600">
                            <i class="fas fa-paper-plane fa-lg mr-2"></i>
                            <span class="font-bold text-xl tracking-tight text-slate-800">BulkSMS</span>
                        </div>
                        <div class="hidden sm:ml-8 sm:flex sm:space-x-4">
                            <button onclick="router.navigate('phones')"
                                class="nav-link px-3 py-2 text-sm font-medium rounded-lg text-slate-600 hover:bg-slate-50 hover:text-blue-600 transition-all duration-200">
                                <i class="fas fa-mobile-alt mr-1"></i> Phones
                            </button>
                            <button onclick="router.navigate('groups')"
                                class="nav-link px-3 py-2 text-sm font-medium rounded-lg text-slate-600 hover:bg-slate-50 hover:text-blue-600 transition-all duration-200">
                                <i class="fas fa-users mr-1"></i> Groups
                            </button>
                            <button onclick="router.navigate('templates')"
                                class="nav-link px-3 py-2 text-sm font-medium rounded-lg text-slate-600 hover:bg-slate-50 hover:text-blue-600 transition-all duration-200">
                                <i class="fas fa-file-alt mr-1"></i> Templates
                            </button>
                            <button onclick="router.navigate('transactions')"
                                class="nav-link px-3 py-2 text-sm font-medium rounded-lg text-slate-600 hover:bg-slate-50 hover:text-blue-600 transition-all duration-200">
                                <i class="fas fa-exchange-alt mr-1"></i> Transactions
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <button onclick="logout()"
                            class="ml-4 px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50 rounded-lg transition-all duration-200">
                            <i class="fas fa-sign-out-alt mr-1"></i> Logout
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Dynamic Content -->
        <main id="content"
            class="flex-grow max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8 animate__animated animate__fadeIn">
            <!-- Content will be injected here -->
        </main>

        <!-- Footer -->
        <footer class="bg-white border-t border-slate-100 py-6 text-center text-slate-400 text-sm">
            &copy; 2026 BulkSMS Panel. Designed with <i class="fas fa-heart text-red-400"></i>
        </footer>
    </div>

    <!-- Modals (SweetAlert2 is used instead for complex forms for better UX) -->

    <script src="app.js"></script>
</body>

</html>
