services:
  app:
    build: .
    container_name: bulksms-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_HOST=db
      - DB_DIALECT=mysql
      - API_KEY=${API_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bulksms-network

  db:
    image: mysql:8.0
    container_name: bulksms-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root ${DB_PASSWORD:+-p$DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - bulksms-network

networks:
  bulksms-network:
    driver: bridge

volumes:
  mysql_data:
